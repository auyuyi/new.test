<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab | Experimental Design</title>
    
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <nav>
        <div class="logo">LAB.NAME</div>
        <div class="nav-links">
            <a href="#">Works</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </div>
    </nav>

    <div class="slider">
        <div class="slide active">
            <img src="https://images.unsplash.com/photo-1494438639946-1ebd1d20bf85?auto=format&fit=crop&q=80&w=2000" class="bg-img" alt="bg">
            <div class="content">
                <p>Experimental Lab 01</p>
                <h1>MINIMALISM</h1>
            </div>
        </div>

        <div class="slide">
            <img src="https://images.unsplash.com/photo-1550684848-fac1c5b4e853?auto=format&fit=crop&q=80&w=2000" class="bg-img" alt="bg">
            <div class="content">
                <p>Experimental Lab 02</p>
                <h1>ABSTRACTION</h1>
            </div>
        </div>
    </div>

    <div class="controls">
        <button id="prevBtn">←</button>
        <button id="nextBtn">→</button>
    </div>

    <script>
        const slides = document.querySelectorAll('.slide');
        const nextBtn = document.querySelector('#nextBtn');
        const prevBtn = document.querySelector('#prevBtn');
        let current = 0;

        function showSlide(index) {
            slides[current].classList.remove('active');
            current = (index + slides.length) % slides.length;
            slides[current].classList.add('active');
        }

        nextBtn.addEventListener('click', () => showSlide(current + 1));
        prevBtn.addEventListener('click', () => showSlide(current - 1));
    </script>
</body>
</html>
