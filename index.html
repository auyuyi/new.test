<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auyuyi | Illustrator & Artist</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="global-background">
        <img src="your-background.webp" alt="Background Art" id="bg-image">
        <div class="overlay"></div>
    </div>

    <nav class="navbar">
        <div class="nav-container">
            <a href="#" class="logo" id="nav-logo">AUYUYI</a>
            
            <ul class="nav-links">
                <li data-page="home" class="active">Home</li>
                <li data-page="portfolios">Portfolios</li>
                <li data-page="process">Process</li>
                <li data-page="about">About</li>
                <li data-page="contact">Contact</li>
                <li data-page="shop">Shop</li>
                <div class="nav-underline"></div>
            </ul>
        </div>
    </nav>

    <main id="content-slider">
        
        <section class="page active" id="home">
            <div class="home-content">
                <h1 class="big-name">Auyuyi</h1>
                <p class="tagline">Illustrator / Visual Storyteller / Dreamer</p>
                
                <div class="social-links">
                    <a href="https://instagram.com/..." target="_blank" class="icon-ig">Instagram</a>
                    <a href="https://twitter.com/..." target="_blank" class="icon-tw">Twitter</a>
                    <a href="https://artstation.com/..." target="_blank" class="icon-as">ArtStation</a>
                    <a href="mailto:..." class="icon-mail">Email</a>
                </div>
            </div>
            
            <footer class="copyright">
                <p>&copy; 2026 Auyuyi. All rights reserved.</p>
            </footer>
        </section>

        <section class="page" id="portfolios">
            <div class="portfolio-container">
                <div class="portfolio-frame">
                    <div class="gallery-grid">
                        <div class="thumb-item"><img src="thumb1.webp" alt="Work 1"></div>
                        <div class="thumb-item"><img src="thumb2.webp" alt="Work 2"></div>
                        </div>
                </div>
                <div class="custom-scrollbar">
                    <div class="scrollbar-thumb"></div>
                </div>
            </div>
            
            <div class="image-loader-bar" id="hd-loader"></div>
        </section>

        <section class="page" id="process"><h2>Process</h2></section>
        <section class="page" id="about"><h2>About</h2></section>

    </main>

    <div class="side-arrow" id="next-page-btn">
        <span>&#8594;</span>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
