<!DOCTYPE html>
<html lang="en">
<body style="background:#f5f5f7;color:#86868b;font-family:sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;margin:0">
    <h1 style="font-size:8rem;margin:0;opacity:0.2">404</h1>
    <p style="font-size:1.2rem;color:#1d1d1f">Page not found</p>
    <a href="/" onclick="smartBack(event)" style="color:#0066cc;text-decoration:none;font-size:0.9rem">Return Home</a>
</body>
<script>
function smartBack(event) {
    event.preventDefault();
    

    if (window.history.length > 1 && document.referrer.includes(window.location.hostname)) {
        window.history.back();
    } 

    else {
        window.close(); 
        

        setTimeout(() => {
            window.location.href = "/";
        }, 300);
    }
}
</script>
</html>
