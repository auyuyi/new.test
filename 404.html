<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Not Found</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-color: #f5f5f7; /* 经典的苹果灰底 */
            color: #1d1d1f; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center h-screen">

    <div class="text-center">
        <h1 class="text-9xl font-semibold tracking-tighter text-[#86868b] opacity-30">404</h1>
        
        <div class="mt-4">
            <h2 class="text-xl font-medium tracking-tight text-[#1d1d1f]">Page not found</h2>
            <p class="text-sm text-[#86868b] mt-2 mb-10">The link you followed may be broken, <br>or the page may have been removed.</p>
            
            <a href="/" class="text-sm font-medium text-indigo-600 hover:text-indigo-500 transition-colors flex items-center justify-center gap-1 group">
                <svg class="w-4 h-4 transform group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                </svg>
                Return Home
            </a>
        </div>
    </div>


</body>
</html>
