<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Not Found</title>
    <style>
        body { 
            background-color: #f5f5f7; 
            color: #1d1d1f; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        .container { text-align: center; }
        .error-code {
            font-size: 8rem;
            font-weight: 600;
            letter-spacing: -0.05em;
            color: #86868b;
            opacity: 0.3;
            margin: 0;
            line-height: 1;
        }
        .content { margin-top: 1rem; }
        h2 { font-size: 1.25rem; font-weight: 500; letter-spacing: -0.01em; margin: 0; }
        p { font-size: 0.875rem; color: #86868b; margin-top: 0.5rem; margin-bottom: 2.5rem; line-height: 1.5; }
        .back-link {
            font-size: 0.875rem;
            font-weight: 500;
            color: #4f46e5;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.25rem;
            transition: color 0.2s;
        }
        .back-link:hover { color: #6366f1; }
        .arrow { width: 1rem; height: 1rem; transition: transform 0.2s; }
        .back-link:hover .arrow { transform: translateX(-4px); }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="error-code">404</h1>
        <div class="content">
            <h2>Page not found</h2>
            <p>The link you followed may be broken, <br>or the page may have been removed.</p>
            <a href="/" class="back-link">
                <svg class="arrow" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                </svg>
                Return Home
            </a>
        </div>
    </div>
</body>
</html>
